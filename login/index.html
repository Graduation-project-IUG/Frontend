<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ملتقى - تسجيل الدخول</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="page-wrapper">
        <div class="main-card">
            <!-- قسم الصورة المربعة الممركزة -->
            <div class="image-section">
                <img src="76dec50554df4259d590d51ecb5de80a9f4316c0.png" alt="ملتقى">
            </div>

            <!-- قسم النموذج -->
            <div class="form-section">
                <header>
                    <span class="brand-logo">ملتقى</span>
                </header>
                
                <div class="form-container">
                    <div class="accent-line"></div>
                    <h2>تسجيل الدخول</h2>
                    
                    <form>
                        <div class="input-wrapper">
                            <label>البريد الإلكتروني</label>
                            <input type="email" placeholder="example@mail.com" required>
                        </div>
                        <div class="input-wrapper">
                            <label>كلمة المرور</label>
                            <input type="password" placeholder="********" required>
                        </div>
                        <button type="submit" class="login-btn">تسجيل الدخول</button>
                    </form>

                    <div class="or-divider">أو</div>

                    <div class="social-box">
                        <button class="social-item"><img src="https://www.gstatic.com/images/branding/product/1x/googleg_48dp.png"> جوجل</button>
                        <button class="social-item"><img src="https://upload.wikimedia.org/wikipedia/commons/f/fa/Apple_logo_black.svg"> آبل</button>
                    </div>
                    
                    <p class="footer-text">ليس لديك حساب؟ <a href="#">أنشئ حساباً</a></p>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
