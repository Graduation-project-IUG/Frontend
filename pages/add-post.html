<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>إضافة منشور - ملتقى</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800;900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../css/style.css" />
  </head>
  <body>
    <div class="site-wrapper">
      <nav class="navbar">
        <div class="container">
          <div
            style="
              display: flex;
              align-items: center;
              justify-content: space-between;
              height: 64px;
            "
          >
            <a href="../index.html" class="navbar-logo">ملتقى</a>
            <div class="navbar-links">
              <a href="feed.html">آخر المنشورات</a
              ><a href="my-posts.html">منشوراتي</a
              ><a href="add-post.html">إضافة منشور</a
              ><a href="about.html">عن المنصة</a>
            </div>
            <div class="navbar-actions">
              <a class="btn btn-secondary btn-sm navbar-inline-action" href="profile.html"
                ><span data-current-user-name>الملف الشخصي</span></a
              ><a class="btn btn-danger btn-sm navbar-inline-action" href="login.html" data-logout
                >تسجيل الخروج</a
              >
              <button class="mobile-menu-btn" id="mobileMenuBtn" aria-label="فتح القائمة">
                <svg
                  width="20"
                  height="20"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                  viewBox="0 0 24 24"
                >
                  <path d="M3 12h18M3 6h18M3 18h18" />
                </svg>
              </button>
            </div>
          </div>
          <div class="mobile-menu" id="mobileMenu">
            <a href="feed.html">آخر المنشورات</a>
            <a href="my-posts.html">منشوراتي</a>
            <a href="add-post.html" class="active">إضافة منشور</a>
            <a href="about.html">عن المنصة</a>
            <div class="mobile-divider"></div>
            <a href="profile.html">الملف الشخصي</a>
            <a href="settings.html">الإعدادات</a>
            <a href="login.html" class="logout" data-logout style="color: var(--danger)">تسجيل الخروج</a>
          </div>
        </div>
      </nav>
      <main>
        <div
          class="container"
          style="padding-top: 2rem; padding-bottom: 2rem; max-width: 760px"
        >
          <div style="text-align: center; margin-bottom: 2rem">
            <h1
              style="
                font-size: 1.5rem;
                font-weight: 700;
                color: var(--gray-900);
              "
            >
              مرحباً <span data-current-user-name>المستخدم</span>
            </h1>
            <p style="color: var(--gray-500); margin-top: 0.25rem">
              أضف منشوراً جديداً. التقييمات تأتي لاحقاً من تعليقات المستخدمين،
              مش من صاحب المنشور نفسه.
            </p>
          </div>
          <form
            id="add-post-form"
            style="display: flex; flex-direction: column; gap: 1.5rem"
          >
            <div class="card">
              <div class="card-body">
                <h3
                  style="
                    font-weight: 700;
                    color: var(--gray-900);
                    margin-bottom: 1rem;
                  "
                >
                  تفاصيل المنشور
                </h3>
                <div class="form-group">
                  <label class="form-label">العنوان</label
                  ><input
                    name="title"
                    type="text"
                    class="form-input"
                    placeholder="مثال: صيدلية الأمانة - غزة"
                    minlength="5"
                    maxlength="100"
                    required
                  />
                </div>
                <div class="form-group">
                  <label class="form-label">التصنيف</label
                  ><select
                    name="category"
                    id="categorySelect"
                    class="form-input"
                    required
                  >
                    <option value="">اختر التصنيف</option>
                    <option>صيدلية</option>
                    <option>كهربائي</option>
                    <option>إنترنت</option>
                    <option>كاميرات</option>
                    <option>مطعم</option>
                    <option>سوبرماركت</option>
                    <option>إلكترونيات</option>
                    <option>خدمات</option>
                    <option>أخرى</option>
                  </select>
                </div>
                <div class="form-group" style="margin-bottom: 0">
                  <label class="form-label">الوصف</label
                  ><textarea
                    name="description"
                    class="form-input"
                    rows="7"
                    placeholder="اكتب تفاصيل المنشور وتجربتك أو معلومات المكان..."
                    minlength="8"
                    maxlength="1000"
                  ></textarea>
                </div>
              </div>
            </div>
            <button type="submit" class="btn btn-primary btn-lg">
              نشر المنشور
            </button>
          </form>
        </div>
      </main>
    </div>
    <script src="../js/main.js"></script>
    <script src="../js/api/client.js"></script>
    <script src="../js/pages/add-post.js"></script>
  </body>
</html>
