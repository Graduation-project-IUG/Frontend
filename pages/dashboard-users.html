<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>المستخدمين - لوحة التحكم - ملتقى</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>
  <div class="dashboard-body">
    <div class="dashboard-sidebar-overlay" id="sidebarOverlay"></div>
    <aside class="dashboard-sidebar" id="dashboardSidebar">
      <div class="dashboard-sidebar-header">
        <a href="../index.html" class="logo">ملتقى</a>
        <button style="background:none;border:none;padding:0.5rem;color:var(--gray-500);cursor:pointer;" onclick="document.getElementById('dashboardSidebar').classList.remove('open');document.getElementById('sidebarOverlay').classList.remove('open');">
          <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M18 6 6 18M6 6l12 12"/></svg>
        </button>
      </div>
      <nav class="dashboard-sidebar-nav">
        <a href="dashboard.html"><svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="9"/><rect x="14" y="3" width="7" height="5"/><rect x="14" y="12" width="7" height="9"/><rect x="3" y="16" width="7" height="5"/></svg>لوحة التحكم</a>
        <a href="dashboard-users.html" class="active"><svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>المستخدمين</a>
        <a href="dashboard-categories.html"><svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>التصنيفات</a>
        <a href="dashboard-reports.html"><svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M4 15s1-1 4-1 5 2 8 2 4-1 4-1V3s-1 1-4 1-5-2-8-2-4 1-4 1z"/><line x1="4" y1="22" x2="4" y2="15"/></svg>الإبلاغات</a>
      </nav>
      <div class="dashboard-sidebar-footer">
        <a href="../index.html"><svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>العودة للموقع</a>
      </div>
    </aside>

    <div class="dashboard-main">
      <header class="dashboard-topbar">
        <div class="dashboard-topbar-inner">
          <div class="dashboard-topbar-left">
            <button style="background:none;border:none;padding:0.5rem;color:var(--gray-500);cursor:pointer;" onclick="document.getElementById('dashboardSidebar').classList.add('open');document.getElementById('sidebarOverlay').classList.add('open');">
              <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M3 12h18M3 6h18M3 18h18"/></svg>
            </button>
            <h1>المستخدمين</h1>
          </div>
          <div class="dashboard-topbar-right">
            <div class="dashboard-topbar-search"><input type="text" placeholder="بحث..."><svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg></div>
            <a href="profile.html"><img src="../images/avatar-saeed.jpg" alt="" style="width:32px;height:32px;border-radius:50%;object-fit:cover;border:1px solid var(--gray-200);"></a>
          </div>
        </div>
      </header>

      <div class="dashboard-content">
        <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:1rem;margin-bottom:1.5rem;">
          <div>
            <h2 style="font-size:1.25rem;font-weight:700;color:var(--gray-900);">المستخدمين</h2>
            <p style="font-size:0.875rem;color:var(--gray-500);margin-top:0.25rem;">الإجمالي: <strong id="usersCount">—</strong></p>
          </div>
          <button id="addUserBtn" class="btn btn-primary btn-sm">
            <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
            إضافة مستخدم جديد
          </button>
        </div>

        <div class="filter-search" style="max-width:400px;margin-bottom:1.5rem;">
          <input type="text" id="usersSearch" placeholder="البحث في المستخدمين...">
          <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        </div>

        <div class="table-card">
          <table class="data-table">
            <thead>
              <tr>
                <th>المستخدم</th>
                <th>المدينة</th>
                <th>الدور</th>
                <th>الهاتف</th>
                <th>الحالة</th>
                <th>إجراءات</th>
              </tr>
            </thead>
            <tbody id="usersTableBody">
              <tr><td colspan="6" style="text-align:center;padding:2rem;color:var(--gray-400);">جاري التحميل...</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>

  <!-- Add / Edit User Modal -->
  <div class="modal-overlay" id="userModal">
    <div class="modal-box">
      <div class="modal-header">
        <h3 id="userModalTitle" style="font-weight:700;color:var(--gray-900);font-size:1.1rem;">إضافة مستخدم جديد</h3>
        <button class="modal-close-btn" id="userModalClose">
          <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M18 6 6 18M6 6l12 12"/></svg>
        </button>
      </div>
      <form id="userModalForm" style="display:flex;flex-direction:column;gap:1rem;">
        <div class="form-group" style="margin-bottom:0;">
          <label class="form-label">الاسم الكامل *</label>
          <input type="text" id="uName" class="form-input" required placeholder="أحمد محمد">
        </div>
        <div class="form-group" style="margin-bottom:0;">
          <label class="form-label">البريد الإلكتروني *</label>
          <input type="email" id="uEmail" class="form-input" required placeholder="user@example.com">
        </div>
        <div class="form-group" style="margin-bottom:0;">
          <label class="form-label">كلمة المرور <span style="color:var(--gray-400);font-weight:400;">(مطلوبة عند الإضافة)</span></label>
          <input type="password" id="uPassword" class="form-input" placeholder="StrongPassword@123">
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:1rem;">
          <div class="form-group" style="margin-bottom:0;">
            <label class="form-label">الهاتف</label>
            <input type="text" id="uPhone" class="form-input" placeholder="+970599000000">
          </div>
          <div class="form-group" style="margin-bottom:0;">
            <label class="form-label">المدينة</label>
            <input type="text" id="uCity" class="form-input" placeholder="غزة">
          </div>
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:1rem;">
          <div class="form-group" style="margin-bottom:0;">
            <label class="form-label">الدور</label>
            <select id="uRole" class="form-input">
              <option value="User">مستخدم</option>
              <option value="Admin">أدمن</option>
            </select>
          </div>
          <div class="form-group" style="margin-bottom:0;">
            <label class="form-label">الحالة</label>
            <select id="uStatus" class="form-input">
              <option value="Active">مفعل</option>
              <option value="Inactive">متوقف</option>
            </select>
          </div>
        </div>
        <div style="display:flex;gap:0.75rem;justify-content:flex-end;margin-top:0.5rem;">
          <button type="button" class="btn btn-secondary btn-sm" onclick="document.getElementById('userModal').classList.remove('show')">إلغاء</button>
          <button type="submit" class="btn btn-primary btn-sm">حفظ</button>
        </div>
      </form>
    </div>
  </div>

  <script>
    document.getElementById('sidebarOverlay').addEventListener('click', function() {
      document.getElementById('dashboardSidebar').classList.remove('open');
      this.classList.remove('open');
    });
  </script>
  <script src="../js/main.js"></script>
</body>
</html>
