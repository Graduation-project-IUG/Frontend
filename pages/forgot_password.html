<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>نسيت كلمة المرور - ملتقى</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>
  <div class="auth-layout">
    <div class="auth-image">
      <img src="../images/hero-group.jpg" alt="مجتمع ملتقى">
      <div class="auth-image-overlay"></div>
      <div class="auth-image-text">
        <h2>انضم لمجتمع ملتقى</h2>
        <p>شارك تجاربك ومنشوراتك مع الآلاف من المستخدمين</p>
      </div>
    </div>

    <div class="auth-form-wrapper">
      <div class="auth-form-box">
        <div class="auth-form-header">
          <a href="../index.html" class="logo">ملتقى</a>
          <h1>استعادة كلمة المرور</h1>
          <p>لا مشكلة، خلينا نرجّعك للحساب بدون دراما تقنية.</p>
        </div>
        <form id="forgot-password-form" action="/api/auth/forgot-password" method="POST">
  <div class="alert-note" style="margin-bottom:1.25rem;">أدخل بريدك الإلكتروني وسنرسل تعليمات الاستعادة عند توفر الخدمة في الـbackend.</div>
  <div class="form-group"><label class="form-label">البريد الإلكتروني</label><input name="email" type="email" class="form-input" placeholder="example@email.com" required></div>
  <button type="submit" class="btn btn-primary w-full">إرسال رابط الاستعادة</button>
</form>
        <p class="auth-footer"><a href="login.html">العودة لتسجيل الدخول</a></p>
      </div>
    </div>
  </div>
  <script src="../js/main.js"></script>
  <script src="../js/api/client.js"></script>
  <script src="../js/api/forgot-password.js"></script>
</body>
</html>
