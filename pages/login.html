
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>تسجيل الدخول - ملتقى</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>
  <div class="auth-layout">
    <!-- Left Image -->
    <div class="auth-image">
      <img src="../images/hero-group.jpg" alt="مجتمع ملتقى">
      <div class="auth-image-overlay"></div>
      <div class="auth-image-text">
        <h2>انضم لمجتمع ملتقى</h2>
        <p>شارك تجاربك ومراجعاتك مع الآلاف من المستخدمين</p>
      </div>
    </div>

    <!-- Right Form -->
    <div class="auth-form-wrapper">
      <div class="auth-form-box">
        <div class="auth-form-header">
          <a href="../index.html" class="logo">ملتقى</a>
          <h1>تسجيل الدخول</h1>
          <p>أدخل بيانات حسابك للوصول للمنصة</p>
        </div>

        <form id="loginForm">
          <div class="form-group">
            <label class="form-label">البريد الإلكتروني</label>
            <input type="email" id="loginEmail" class="form-input" placeholder="example@email.com" required>
          </div>

          <div class="form-group">
            <label class="form-label">كلمة المرور</label>
            <div class="form-input-wrapper">
              <input type="password" id="loginPassword" class="form-input" placeholder="••••••••" required>
              <button type="button" class="toggle-password">
                <span class="show-icon"><svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg></span>
                <span class="hide-icon" style="display:none"><svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><path d="M14.12 14.12a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg></span>
              </button>
            </div>
          </div>

          <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1.25rem;">
            <label class="form-check">
              <input id="rememberme" type="checkbox">
              <span>تذكرني</span>
            </label>
            <a href="#" style="font-size:0.875rem;color:var(--primary);">نسيت كلمة المرور؟</a>
          </div>

          <button type="submit" class="btn btn-primary w-full">
            <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/></svg>
            تسجيل الدخول
          </button>
        </form>

        <div class="auth-social-divider">
          <span>أو</span>
        </div>

        <div class="auth-social-buttons">
          <button type="button" class="auth-social-btn">
            <svg width="20" height="20" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
            جوجل
          </button>
          <button type="button" class="auth-social-btn">
            <svg width="20" height="20" viewBox="0 0 24 24"><path fill="#000" d="M17.05 20.28c-.98.95-2.05.8-3.08.35-1.09-.46-2.09-.48-3.24 0-1.44.62-2.2.44-3.06-.35C2.79 15.25 3.51 7.59 9.05 7.31c1.35.07 2.29.74 3.08.8 1.18-.24 2.31-.93 3.57-.84 1.51.12 2.65.72 3.4 1.8-3.12 1.87-2.38 5.98.48 7.13-.57 1.5-1.31 2.99-2.54 4.09l.01-.01zM12.03 7.25c-.15-2.23 1.66-4.07 3.74-4.25.29 2.58-2.34 4.5-3.74 4.25z"/></svg>
            آبل
          </button>
        </div>

        <p class="auth-footer">
          ليس لديك حساب؟
          <a href="register.html">أنشئ حساباً</a>
        </p>
      </div>
    </div>
  </div>

  <script src="../js/main.js"></script>
</body>
</html>
