<!DOCTYPE html><html lang="ar" dir="rtl"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>تفاصيل المنشور - ملتقى</title><link rel="preconnect" href="https://fonts.googleapis.com"><link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800;900&display=swap" rel="stylesheet"><link rel="stylesheet" href="../css/style.css"></head><body><div class="site-wrapper"><nav class="navbar"><div class="container"><div style="display:flex;align-items:center;justify-content:space-between;height:64px;"><a href="../index.html" class="navbar-logo">ملتقى</a><div class="navbar-links"><a href="../index.html">الرئيسية</a><a href="my-posts.html">منشوراتي</a><a href="add-post.html">إضافة منشور</a><a href="about.html">عن المنصة</a></div><div class="navbar-actions"><a class="btn btn-secondary btn-sm" href="profile.html"><span data-current-user-name>الملف الشخصي</span></a><a class="btn btn-danger btn-sm" href="login.html" data-logout>تسجيل الخروج</a></div></div></div></nav><main><div class="container" style="padding-top:2rem;padding-bottom:2rem;"><div id="postContent" class="review-detail-grid"><article><div class="card"><div class="card-body"><div class="post-badges" style="margin-bottom:1rem;"><span id="postCategory" class="badge badge-blue">—</span></div><h1 id="postTitle" style="font-size:1.75rem;font-weight:800;color:var(--gray-900);margin-bottom:1rem;">جاري تحميل المنشور...</h1><p id="postDescription" style="color:var(--gray-700);line-height:1.8;margin-bottom:1rem;"></p><div class="review-card-meta"><span id="postDate">—</span></div><div class="review-actions-bar"><button id="reactBtn" class="review-action-btn" type="button">إعجاب</button><a class="review-action-btn" href="#comments">تعليق</a></div></div></div><div class="card" style="margin-top:1.5rem;" id="comments"><div class="card-body"><div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;"><h2 style="font-size:1.25rem;font-weight:700;">التعليقات والتقييمات</h2><span><strong id="reviewsCount">0</strong> تقييم</span></div><form id="commentForm" class="comment-form"><div class="form-group"><label class="form-label">تقييمك للمنشور</label><div class="rating-select"><label><input type="radio" name="rating" value="1">1</label><label><input type="radio" name="rating" value="2">2</label><label><input type="radio" name="rating" value="3">3</label><label><input type="radio" name="rating" value="4">4</label><label><input type="radio" name="rating" value="5">5</label></div></div><div class="comment-input-wrap"><textarea name="content" placeholder="اكتب تعليقك..." required minlength="3" maxlength="500"></textarea><button type="submit"><svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg></button></div></form><div id="commentsList"></div></div></div></article><aside><div class="sidebar-card"><h3>متوسط التقييم</h3><div id="averageRating" class="review-stars">—</div><p style="font-size:.875rem;color:var(--gray-500);margin-top:.5rem;">يُحسب من متوسط تقييمات التعليقات، وليس من صاحب المنشور.</p></div><div class="sidebar-card"><h3>الإبلاغ عن المنشور</h3><form id="reportForm"><div class="form-group"><label class="form-label">سبب الإبلاغ</label><textarea name="reason" class="form-input" rows="4" minlength="8" maxlength="1000" required></textarea></div><button class="btn btn-danger w-full" type="submit">إرسال إبلاغ</button></form></div></aside></div></div></main></div><script src="../js/main.js"></script><script src="../js/api/client.js"></script><script src="../js/pages/post.js"></script></body></html>
