<!DOCTYPE html><html lang="ar" dir="rtl"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>الملف الشخصي - ملتقى</title><link rel="preconnect" href="https://fonts.googleapis.com"><link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800;900&display=swap" rel="stylesheet"><link rel="stylesheet" href="../css/style.css"></head><body><div class="site-wrapper"><nav class="navbar"><div class="container"><div style="display:flex;align-items:center;justify-content:space-between;height:64px;"><a href="../index.html" class="navbar-logo">ملتقى</a><div class="navbar-links"><a href="../index.html">الرئيسية</a><a href="my-posts.html">منشوراتي</a><a href="add-post.html">إضافة منشور</a><a href="about.html">عن المنصة</a></div><div class="navbar-actions"><a class="btn btn-secondary btn-sm" href="profile.html"><span data-current-user-name>الملف الشخصي</span></a><a class="btn btn-danger btn-sm" href="login.html" data-logout>تسجيل الخروج</a></div></div></div></nav><main><div class="container" style="padding-top:2rem;padding-bottom:2rem;">
  <div class="profile-header"><div class="profile-cover"></div><div class="profile-header-body"><div class="profile-avatar-wrap"><div class="profile-avatar"><img src="../images/avatar-saeed.jpg" alt="الصورة الشخصية"></div><div class="profile-info" style="flex:1;"><div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:1rem;"><div><h1 id="profileName">المستخدم</h1><div class="location"><svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg> <span id="profileCity">—</span></div></div><button class="btn btn-primary" id="editProfileBtn" type="button">تعديل البيانات</button></div></div></div><div class="profile-stats-grid"><div class="profile-stat-card"><div class="value" id="statCity">—</div><div class="label">المدينة</div></div><div class="profile-stat-card"><div class="value">—</div><div class="label">عدد المنشورات</div></div><div class="profile-stat-card"><div class="value">—</div><div class="label">التعليقات</div></div></div></div></div>
  <div class="card profile-form" style="margin-bottom:1.5rem;"><div class="card-body"><h2 style="font-size:1.25rem;font-weight:700;margin-bottom:1.5rem;">معلومات الحساب</h2><form id="profile-form"><div style="display:grid;grid-template-columns:1fr;gap:1.25rem;" class="form-grid">
    <div class="form-group" style="margin-bottom:0;"><label class="form-label">الاسم الكامل</label><input name="full_name" type="text" class="form-input bg-gray" disabled></div>
    <div class="form-group" style="margin-bottom:0;"><label class="form-label">البريد الإلكتروني</label><input name="email" type="email" class="form-input bg-gray" disabled></div>
    <div class="form-group" style="margin-bottom:0;"><label class="form-label">رقم الموبايل</label><input name="phone" type="tel" class="form-input bg-gray" disabled></div>
    <div class="form-group" style="margin-bottom:0;"><label class="form-label">تاريخ الميلاد</label><input name="birthdate" type="date" class="form-input bg-gray" disabled></div>
    <div class="form-group" style="margin-bottom:0;"><label class="form-label">المدينة</label><input name="city" type="text" class="form-input bg-gray" disabled></div>
    <div class="form-group" style="margin-bottom:0;"><label class="form-label">نبذة شخصية</label><textarea name="bio" class="form-input bg-gray" rows="5" disabled></textarea></div>
  </div></form></div></div>
  <div style="display:grid;grid-template-columns:1fr;gap:1rem;"><a href="my-posts.html" class="card" style="display:flex;align-items:center;gap:1rem;padding:1.5rem;"><div style="font-weight:700;color:var(--gray-900);">منشوراتي</div></a><a href="add-post.html" class="card" style="display:flex;align-items:center;gap:1rem;padding:1.5rem;"><div style="font-weight:700;color:var(--gray-900);">إضافة منشور</div></a></div>
</div><style>.bg-gray{background:var(--gray-50)!important;} @media(min-width:768px){.form-grid{grid-template-columns:1fr 1fr!important;}}</style></main></div><script src="../js/main.js"></script><script src="../js/api/client.js"></script><script src="../js/api/profile.js"></script></body></html>
