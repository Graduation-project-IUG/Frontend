
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>إنشاء حساب - ملتقى</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>
  <div class="auth-layout">
    <!-- Left Image -->
    <div class="auth-image">
      <img src="../images/hero-group.jpg" alt="مجتمع ملتقى">
      <div class="auth-image-overlay"></div>
      <div class="auth-image-text">
        <h2>انضم لمجتمع ملتقى</h2>
        <p>شارك تجاربك ومراجعاتك مع الآلاف من المستخدمين</p>
      </div>
    </div>

    <!-- Right Form -->
    <div class="auth-form-wrapper">
      <div class="auth-form-box">
        <div class="auth-form-header">
          <a href="../index.html" class="logo">ملتقى</a>
          <h1>إنشاء حساب</h1>
          <p>أنشئ حساب جديد وانضم لمجتمعنا</p>
        </div>

        <form id="registerForm">
          <div class="form-group">
            <label class="form-label">الاسم الكامل</label>
            <input type="text" id="registerName" class="form-input" placeholder="محمد أحمد" required>
          </div>

          <div class="form-group">
            <label class="form-label">البريد الإلكتروني</label>
            <input type="email" id="registerEmail" class="form-input" placeholder="example@email.com" required>
          </div>

          <div class="form-group">
            <label class="form-label">كلمة المرور</label>
            <div class="form-input-wrapper">
              <input type="password" id="registerPassword" class="form-input" placeholder="••••••••" required>
              <button type="button" class="toggle-password">
                <span class="show-icon"><svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg></span>
                <span class="hide-icon" style="display:none"><svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><path d="M14.12 14.12a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg></span>
              </button>
            </div>
          </div>

          <div class="form-group">
            <label class="form-check">
              <input type="checkbox" required>
              <span>أوافق على شروط الاستخدام وسياسة الخصوصية</span>
            </label>
          </div>

          <button type="submit" class="btn btn-primary w-full">
            <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="8.5" cy="7" r="4"/><line x1="20" y1="8" x2="20" y2="14"/><line x1="23" y1="11" x2="17" y2="11"/></svg>
            إنشاء حساب
          </button>
        </form>

        <p class="auth-footer">
          لديك حساب بالفعل؟
          <a href="login.html">سجل دخولك</a>
        </p>
      </div>
    </div>
  </div>

  <script src="../js/main.js"></script>
</body>
</html>
