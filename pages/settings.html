    <main>
      <div class="container" style="padding-top:2rem;padding-bottom:2rem;max-width:700px;">
        <h1 style="font-size:1.5rem;font-weight:700;color:var(--gray-900);margin-bottom:1.5rem;">الإعدادات</h1>

        <!-- Account Settings -->
        <div class="card" style="margin-bottom:1.5rem;">
          <div class="card-body">
            <h2 style="font-size:1.125rem;font-weight:700;color:var(--gray-900);margin-bottom:1.25rem;">إعدادات الحساب</h2>
            <div style="display:grid;grid-template-columns:1fr;gap:1.25rem;" class="form-grid-2">
              <div class="form-group" style="margin-bottom:0;">
                <label class="form-label">الاسم الكامل</label>
                <input type="text" class="form-input" value="سعيد حسن">
              </div>
              <div class="form-group" style="margin-bottom:0;">
                <label class="form-label">البريد الإلكتروني</label>
                <input type="email" class="form-input" value="saeed.hassan@example.com">
              </div>
              <div class="form-group" style="margin-bottom:0;">
                <label class="form-label">رقم الموبايل</label>
                <input type="tel" class="form-input" value="059 123 4567">
              </div>
              <div class="form-group" style="margin-bottom:0;">
                <label class="form-label">المدينة</label>
                <select class="form-input"><option>غزة</option><option>الشمال</option><option>الوسطى</option><option>خان يونس</option><option>رفح</option></select>
              </div>
            </div>
          </div>
        </div>

        <!-- Password -->
        <div class="card" style="margin-bottom:1.5rem;">
          <div class="card-body">
            <h2 style="font-size:1.125rem;font-weight:700;color:var(--gray-900);margin-bottom:1.25rem;">تغيير كلمة المرور</h2>
            <div style="display:flex;flex-direction:column;gap:1.25rem;">
              <div class="form-group" style="margin-bottom:0;">
                <label class="form-label">كلمة المرور الحالية</label>
                <div class="form-input-wrapper">
                  <input type="password" class="form-input" placeholder="••••••••">
                  <button type="button" class="toggle-password">
                    <span class="show-icon"><svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg></span>
                    <span class="hide-icon" style="display:none"><svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><path d="M14.12 14.12a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg></span>
                  </button>
                </div>
              </div>
              <div class="form-group" style="margin-bottom:0;">
                <label class="form-label">كلمة المرور الجديدة</label>
                <div class="form-input-wrapper">
                  <input type="password" class="form-input" placeholder="••••••••">
                  <button type="button" class="toggle-password">
                    <span class="show-icon"><svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg></span>
                    <span class="hide-icon" style="display:none"><svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><path d="M14.12 14.12a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg></span>
                  </button>
                </div>
              </div>
              <div class="form-group" style="margin-bottom:0;">
                <label class="form-label">تأكيد كلمة المرور</label>
                <input type="password" class="form-input" placeholder="••••••••">
              </div>
            </div>
          </div>
        </div>

        <!-- Notifications -->
        <div class="card" style="margin-bottom:1.5rem;">
          <div class="card-body">
            <h2 style="font-size:1.125rem;font-weight:700;color:var(--gray-900);margin-bottom:1.25rem;">إعدادات الإشعارات</h2>
            <div style="display:flex;flex-direction:column;gap:1rem;">
              <label style="display:flex;align-items:center;justify-content:space-between;cursor:pointer;">
                <span style="color:var(--gray-700);">إشعارات البريد الإلكتروني</span>
                <input type="checkbox" checked style="width:44px;height:24px;accent-color:var(--primary);">
              </label>
              <label style="display:flex;align-items:center;justify-content:space-between;cursor:pointer;">
                <span style="color:var(--gray-700);">إشعارات التعليقات</span>
                <input type="checkbox" checked style="width:44px;height:24px;accent-color:var(--primary);">
              </label>
              <label style="display:flex;align-items:center;justify-content:space-between;cursor:pointer;">
                <span style="color:var(--gray-700);">إشعارات الإعجابات</span>
                <input type="checkbox" style="width:44px;height:24px;accent-color:var(--primary);">
              </label>
              <label style="display:flex;align-items:center;justify-content:space-between;cursor:pointer;">
                <span style="color:var(--gray-700);">النشرة الإخبارية</span>
                <input type="checkbox" checked style="width:44px;height:24px;accent-color:var(--primary);">
              </label>
            </div>
          </div>
        </div>

        <button class="btn btn-primary w-full">حفظ الإعدادات</button>
      </div>
    </main>
  </div>
  <style>@media(min-width:640px){.form-grid-2{grid-template-columns:1fr 1fr!important;}}</style>
  <script src="../js/main.js"></script>
