<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ملتقى - إنشاء حساب</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="page-wrapper">
        <div class="main-card">
            <!-- قسم الصورة الجديدة مع الحفاظ على نفس التمركز -->
            <div class="image-section">
                <img src="5abf818cc15e9930a126d93efdfa7a5ee53d33ce.jpg" alt="ملتقى">
            </div>

            <!-- قسم نموذج إنشاء حساب -->
            <div class="form-section">
                <header>
                    <span class="brand-logo">ملتقى</span>
                </header>
                
                <div class="form-container">
                    <div class="accent-line"></div>
                    <h2>إنشاء حساب</h2>
                    
                    <form id="registerForm">
                        <div class="input-wrapper">
                            <label>الاسم كامل</label>
                            <input type="text" placeholder="أدخل اسمك " required>
                        </div>

                        <div class="input-wrapper">
                            <label>البريد الإلكتروني</label>
                            <input type="email" placeholder="example@mail.com" required>
                        </div>

                        <div class="input-wrapper">
                            <label>رقم الموبايل</label>
                            <input type="tel" placeholder="05XXXXXXXX" required>
                        </div>

                        <div class="input-wrapper">
                            <label>كلمة المرور</label>
                            <input type="password" placeholder="********" required>
                        </div>

                        <button type="submit" class="login-btn">إنشاء حساب</button>
                    </form>

                    <div class="or-divider">أو</div>

                    <div class="social-box">
                        <button class="social-item"><img src="https://www.gstatic.com/images/branding/product/1x/googleg_48dp.png"> جوجل</button>
                        <button class="social-item"><img src="https://upload.wikimedia.org/wikipedia/commons/f/fa/Apple_logo_black.svg"> آبل</button>
                    </div>
                    
                    <p class="footer-text">لديك حساب بالفعل؟ <a href="login.html">سجل دخولك</a></p>
                </div>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
